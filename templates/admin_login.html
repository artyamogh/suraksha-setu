{% extends "base.html" %}

{% block title %}Admin Login | Suraksha Setu{% endblock %}

{% block content %}
<div class="row justify-content-center my-4-rem">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-dark text-white text-center py-4">
                <i class="fas fa-user-shield fa-3x mb-2"></i>
                <h2 class="mb-0 fs-3 text-white">Admin Portal</h2>
            </div>
            <div class="card-body p-5">
                {% if error %}
                <div class="alert alert-danger d-flex align-items-center">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    <div>{{ error }}</div>
                </div>
                {% endif %}

                <form method="POST">
                    <div class="mb-4">
                        <label for="username" class="form-label fw-bold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
                        </div>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-dark btn-lg">Login</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center py-3 bg-light">
                <small class="text-muted">Restricted Access Authorized Person Only</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
